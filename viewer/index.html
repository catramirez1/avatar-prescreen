<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>VRM Viewer</title>
  <style>
    body { margin: 0; background: #111; color: white; font-family: system-ui, -apple-system, sans-serif; }
    #info { position: fixed; top: 10px; left: 10px; background: black; padding: 10px; border-radius: 8px; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="info">
    <strong>VRM Viewer</strong><br/>
    Loading: /assets/models/avatar.vrm
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.0.0/lib/three-vrm.min.js"></script>

  <script>
    const MODEL_URL = "/assets/models/avatar.vrm";  // IMPORTANT: absolute path

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.4, 2.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(1, 1, 1);
    scene.add(light);

    const loader = new THREE.GLTFLoader();
    let currentVrm = null;

    fetch(MODEL_URL).then(r => {
      console.log("VRM fetch status:", r.status);
      return r.arrayBuffer();
    }).then(buffer => {
      return THREE.VRMUtils.parseVrm(new Uint8Array(buffer));
    }).then(vrm => {
      currentVrm = vrm;
      scene.add(vrm.scene);
      console.log("VRM loaded!", vrm);
    }).catch(err => console.error("VRM load failed:", err));

    function animate() {
      requestAnimationFrame(animate);
      if (currentVrm) {
        currentVrm.update(0.016);
      }
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
